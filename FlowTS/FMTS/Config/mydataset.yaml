model:
  target: Models.interpretable_diffusion.FMTS.FM_TS
  params:
    seq_length: 128
    feature_size: 1
    n_layer_enc: 4
    n_layer_dec: 4
    d_model: 64
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.5
    resid_pd: 0.5
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-5
  max_epochs: 1000
  # results_folder: ./Checkpoints_mydataset_flows
  gradient_accumulate_every: 2
  save_cycle: 100

  ema:
    decay: 0.95
    update_interval: 10